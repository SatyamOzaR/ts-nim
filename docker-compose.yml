# All builds use repo root as context so paths match Railway (full git checkout).
services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      FRONTEND_URL: http://localhost:3000

  mcp-server:
    build:
      context: .
      dockerfile: mcp-server/Dockerfile
    ports:
      - "8001:8001"
    env_file: .env
    environment:
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_BACKEND_URL: http://localhost:8000
        NEXT_PUBLIC_API_KEY: ${API_KEY}
    ports:
      - "3000:3000"
    depends_on:
      - backend
